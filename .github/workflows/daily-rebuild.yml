name: Daily Rebuild

run-name: Daily Rebuild - ${{ github.event_name }} - ${{ github.event.client_payload.source || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      puzzle_id:
        description: Optional puzzle id for definition backfill
        required: false
        type: string
      date:
        description: Optional date for definition backfill (YYYY-MM-DD or Month Day, Year)
        required: false
        type: string
      skip_definitions:
        description: Skip NVIDIA definition generation
        required: false
        default: false
        type: boolean
      skip_deploy:
        description: Skip Cloudflare Pages deploy
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types:
      - spellingbee-refresh

concurrency:
  group: daily-rebuild-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    env:
      API_BASE: https://spelling-bee-api.sbsolver.workers.dev
      WORKER_ADMIN_API_KEY: ${{ secrets.WORKER_ADMIN_API_KEY || secrets.APIKEY }}
      APIKEY: ${{ secrets.APIKEY || secrets.WORKER_ADMIN_API_KEY }}
      NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
      NVIDIA_NIM_MODEL: qwen/qwen3-next-80b-a3b-instruct
      NVIDIA_NIM_FALLBACK_MODELS: minimaxai/minimax-m2.7,qwen/qwen3.5-397b-a17b
      NVIDIA_NIM_TIMEOUT_MS: 90000
      NVIDIA_NIM_MAX_TOKENS: 2600
      DEFINITION_BACKLOG_PULL_LIMIT: 24
      DEFINITION_BACKLOG_MAX_MINUTES: 30
      DEFINITION_BACKLOG_BOOTSTRAP_LIMIT: 5000
      DEFINITION_BACKLOG_MAX_CONSECUTIVE_FAILURES: 3
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TARGET_PUZZLE_ID: ${{ inputs.puzzle_id || github.event.client_payload.puzzleId || '' }}
      TARGET_DATE: ${{ inputs.date || github.event.client_payload.date || '' }}
      TRIGGER_SOURCE: ${{ github.event.client_payload.source || github.event_name }}
      SKIP_DEFINITIONS: ${{ inputs.skip_definitions || false }}
      SKIP_DEPLOY: ${{ inputs.skip_deploy || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Show Trigger Context
        run: |
          echo "Triggered by: $TRIGGER_SOURCE"
          echo "GitHub event: ${{ github.event_name }}"
          echo "Target puzzle id: ${TARGET_PUZZLE_ID:-<auto>}"
          echo "Target date: ${TARGET_DATE:-<auto>}"

      - name: Validate Workflow Secrets
        run: |
          if [ -z "$WORKER_ADMIN_API_KEY" ]; then
            echo "::error::Missing worker API key. Add WORKER_ADMIN_API_KEY or APIKEY to the GitHub repository secrets."
            exit 1
          fi

          if [ "$SKIP_DEPLOY" != "true" ]; then
            if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
              echo "::error::Missing Cloudflare deploy secrets. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID."
              exit 1
            fi
          fi

      - name: Build Site Snapshot (Initial Deploy)
        run: npm run build

      - name: Deploy to Cloudflare Pages (Initial)
        if: ${{ env.SKIP_DEPLOY != 'true' }}
        run: npx wrangler pages deploy dist --project-name spellingbee-solver

      - name: Backfill Today's Definitions
        id: today_definitions
        if: ${{ env.SKIP_DEFINITIONS != 'true' }}
        continue-on-error: true
        run: |
          args=(--summary-file today-definitions-summary.json)
          if [ -n "$TARGET_PUZZLE_ID" ]; then
            args+=(--puzzle-id "$TARGET_PUZZLE_ID")
          fi
          if [ -n "$TARGET_DATE" ]; then
            args+=(--date "$TARGET_DATE")
          fi
          node scripts/backfill-definitions.mjs "${args[@]}"

      - name: Note Today Definition Failure
        if: ${{ steps.today_definitions.outcome == 'failure' }}
        run: echo "::warning::Today's definition pass had some failures. Any successful definitions were still written to D1."

      - name: Decide Whether Second Deploy Is Needed
        id: second_deploy
        if: ${{ env.SKIP_DEFINITIONS != 'true' }}
        run: |
          if [ ! -f today-definitions-summary.json ]; then
            echo "redeploy=false" >> "$GITHUB_OUTPUT"
            echo "upserted=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          upserted=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('today-definitions-summary.json','utf8')); process.stdout.write(String(Number(data.upsertedDefinitions||0)));")
          echo "upserted=$upserted" >> "$GITHUB_OUTPUT"

          if [ "$upserted" -gt 0 ]; then
            echo "redeploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "redeploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Site Snapshot (With Today's Definitions)
        if: ${{ env.SKIP_DEFINITIONS != 'true' && steps.second_deploy.outputs.redeploy == 'true' }}
        run: npm run build

      - name: Deploy to Cloudflare Pages (With Today's Definitions)
        if: ${{ env.SKIP_DEFINITIONS != 'true' && env.SKIP_DEPLOY != 'true' && steps.second_deploy.outputs.redeploy == 'true' }}
        run: npx wrangler pages deploy dist --project-name spellingbee-solver

      - name: Backfill Definition Backlog
        id: backlog_definitions
        if: ${{ env.SKIP_DEFINITIONS != 'true' }}
        continue-on-error: true
        run: |
          node scripts/backfill-definitions.mjs \
            --backlog \
            --bootstrap-backlog \
            --summary-file backlog-definitions-summary.json \
            --max-minutes "$DEFINITION_BACKLOG_MAX_MINUTES" \
            --backlog-limit "$DEFINITION_BACKLOG_PULL_LIMIT" \
            --bootstrap-limit "$DEFINITION_BACKLOG_BOOTSTRAP_LIMIT"

      - name: Note Backlog Backfill Failure
        if: ${{ steps.backlog_definitions.outcome == 'failure' }}
        run: echo "::warning::The post-deploy backlog definition pass stopped early. The live site is already deployed; the backlog can continue on the next run."
